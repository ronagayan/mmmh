<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm dark brown background -->
  <rect width="512" height="512" rx="112" fill="#1a0900"/>

  <!-- Subtle orange centre glow -->
  <radialGradient id="g" cx="50%" cy="52%" r="55%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>

  <!-- Lowercase "m" in Fredoka Bold, centred -->
  <text
    x="256"
    y="370"
    font-family="Fredoka"
    font-weight="700"
    font-size="420"
    fill="#f97316"
    text-anchor="middle"
  >m</text>
</svg>
