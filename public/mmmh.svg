<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="#080d18"/>

  <!-- Subtle orange radial glow -->
  <radialGradient id="g" cx="50%" cy="55%" r="52%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>

  <!--
    Bold lowercase "m" — path-based (no font required).
    3 pill stems + 2 quadratic-Bézier arches.

    Stem width : 72 px (rx=36)
    Gap        : 82 px
    Total width: 3×72 + 2×82 = 380 px  → left x = 66
    Stem tops  : y = 172
    Stem bottoms: y = 406  (height 234 px)
    Arch ctrl  : y = 80
    Stem centers: x = 102, 256, 410
  -->

  <!-- Left arch -->
  <path d="M 102,172 Q 179,80 256,172"
        stroke="#f97316" stroke-width="72" stroke-linecap="round" fill="none"/>

  <!-- Right arch -->
  <path d="M 256,172 Q 333,80 410,172"
        stroke="#f97316" stroke-width="72" stroke-linecap="round" fill="none"/>

  <!-- Stem 1 (left) -->
  <rect x="66"  y="172" width="72" height="234" rx="36" fill="#f97316"/>

  <!-- Stem 2 (middle) -->
  <rect x="220" y="172" width="72" height="234" rx="36" fill="#f97316"/>

  <!-- Stem 3 (right) -->
  <rect x="374" y="172" width="72" height="234" rx="36" fill="#f97316"/>
</svg>
